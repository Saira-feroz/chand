<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chand Mubarak - Sparkling Stars</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle at center, #162a4d 0%, #1a1a2e 45%, #050a14 80%, #02040a 100%);
        }

        /* 1. Three Hanging Lanterns (Fanoos) */
        .fanoos-left {
            position: absolute; top: 0; left: 10%; z-index: 20;
            display: flex; gap: 40px;
        }
        .wire {
            width: 1px; height: 160px; background: rgba(255,255,255,0.2);
            position: relative; transform-origin: top center;
            animation: swing 4s infinite alternate ease-in-out;
        }
        .lantern {
            position: absolute; bottom: 0; left: -12px;
            width: 24px; height: 36px; background: #ffffff;
            clip-path: polygon(25% 0%, 75% 0%, 100% 30%, 100% 70%, 75% 100%, 25% 100%, 0% 70%, 0% 30%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
        @keyframes swing { from { transform: rotate(-3deg); } to { transform: rotate(3deg); } }

        /* 2. ENHANCED TWINKLING STARS */
        .stars { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: superTwinkle var(--s) infinite ease-in-out;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
        @keyframes superTwinkle { 
            0%, 100% { opacity: 0.2; transform: scale(0.7); } 
            50% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 15px #fff, 0 0 5px #fff; } 
        }

        /* 3. Main Composition */
        .main-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10;
        }

        .moon {
            position: absolute; width: 450px; height: 450px;
            border-radius: 50%;
            box-shadow: -15px 15px 0 0 #ffffff;
            transform: rotate(-15deg);
            filter: drop-shadow(0 0 25px rgba(255,255,255,0.4));
            z-index: 5;
        }

        .mosque-fixed {
            position: absolute;
            bottom: 22%;
            width: 360px;
            fill: rgba(255, 255, 255, 0.2); 
            z-index: 11;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        .text-overlay {
            position: absolute; 
            /* Text ko mazeed neechay kar diya hai */
            bottom: 38%; 
            left: 58%; 
            transform: translateX(-50%);
            font-family: 'Great Vibes', cursive;
            font-size: 52px; text-align: center; z-index: 25;
            line-height: 1.1;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: fadeInOnly 4s ease-in forwards;
            opacity: 0;
            width: 100%;
        }

        @keyframes fadeInOnly {
            from { opacity: 0; }
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="stars" id="sky"></div>

    <div class="fanoos-left">
        <div class="wire"><div class="lantern"></div></div>
        <div class="wire" style="height: 220px; animation-delay: 1s;"><div class="lantern" style="transform: scale(0.85);"></div></div>
        <div class="wire" style="height: 110px; animation-delay: 0.5s;"><div class="lantern" style="transform: scale(0.9);"></div></div>
    </div>

    <div class="main-container">
        <div class="moon"></div>

        <svg class="mosque-fixed" viewBox="0 0 240 120">
            <rect x="15" y="60" width="2" height="50" />
            <path d="M13,60 L19,60 L16,50 Z" />
            <rect x="223" y="60" width="2" height="50" />
            <path d="M221,60 L227,60 L224,50 Z" />
            <path d="M40,110 Q40,75 70,75 Q100,75 100,110 Z" />
            <path d="M140,110 Q140,75 170,75 Q200,75 200,110 Z" />
            <path d="M85,110 Q85,45 120,45 Q155,45 155,110 Z" />
            <rect x="119" y="38" width="2" height="7" />
            <rect x="70" y="35" width="3" height="75" />
            <path d="M68,35 L75,35 L71.5,25 Z" />
            <rect x="167" y="35" width="3" height="75" />
            <path d="M165,35 L172,35 L168.5,25 Z" />
        </svg>

        <h1 class="text-overlay">Chand Raat Mubarak<br>mere pyaare dostoo</h1>
    </div>

    <script>
        const sky = document.getElementById('sky');
        for (let i = 0; i < 200; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 3 + 1 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.top = Math.random() * 100 + '%';
            s.style.left = Math.random() * 100 + '%';
            s.style.setProperty('--s', Math.random() * 1.5 + 1 + 's');
            sky.appendChild(s);
        }
    </script>
</body>
</html>
